<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo Maths - Operaciones con Conjuntos</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF9800;
            --secondary: #4CAF50;
            --error: #F44336;
            --accent: #2196F3;
            --bg: #FFF9E1;
            --text: #333;
            --board: #5D4037;
        }

        body { font-family: 'Quicksand', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        .lion-doodle { font-size: 80px; animation: bounce 2s infinite; display: inline-block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        h1 { font-family: 'Fredoka One', cursive; color: var(--primary); font-size: 3.5rem; margin: 10px 0; text-shadow: 3px 3px #fff; }

        .controls {
            background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 900px; margin: 0 auto 40px; display: flex; flex-wrap: wrap; gap: 20px;
            justify-content: center; align-items: center; border: 3px dashed var(--primary);
        }

        .panel { background: #fff; border: 5px solid var(--board); border-radius: 15px; margin-bottom: 50px; 
                 box-shadow: 12px 12px 0px #A1887F; max-width: 1100px; margin-left: auto; margin-right: auto; overflow: hidden; }
        
        .enunciado { background: var(--board); color: white; padding: 25px; font-size: 1.2rem; line-height: 1.6; }
        .math-block { display: block; margin: 10px 0; color: #FFEB3B; font-weight: bold; font-family: 'Courier New', monospace; font-size: 1.3rem; }
        
        .columns { display: grid; grid-template-columns: 1fr 1fr; min-height: 400px; }
        .col-left { padding: 30px; border-right: 3px solid var(--board); }
        .col-right { padding: 30px; background: #f1f8e9; display: none; }

        .option-item { display: flex; align-items: center; margin: 12px 0; padding: 15px; border: 2px solid #e0e0e0; 
                       border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .option-item:hover { background: #fffde7; }
        .correct-choice { background-color: #e8f5e9 !important; border-color: var(--secondary) !important; color: #2e7d32; font-weight: bold; }
        .wrong-choice { background-color: #ffebee !important; border-color: var(--error) !important; color: #c62828; }
        .status { margin-left: auto; font-size: 1.4rem; }

        .venn-container { text-align: center; margin-top: 25px; background: #fafafa; border-radius: 10px; padding: 10px; }
        .step { margin-bottom: 12px; padding-left: 15px; border-left: 4px solid var(--accent); font-size: 1rem; background: rgba(255,255,255,0.6); padding: 8px; }

        select, input, button { padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-family: 'Quicksand'; font-weight: bold; }
        button { background: var(--secondary); color: white; border: none; cursor: pointer; box-shadow: 0 4px 0 #388E3C; }
        button:active { transform: translateY(3px); box-shadow: none; }
        .disabled { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <div class="lion-doodle">🦁</div>
        <h1>Leo Maths</h1>
        <p>¡Aprende Conjuntos con los ejemplos de clase y retos Pre-U!</p>
    </header>

    <div class="controls">
        <div><label>Ejercicios: </label><input type="number" id="qty" min="1" max="25" value="4"></div>
        <div>
            <label>Nivel: </label>
            <select id="level">
                <option value="basic">Básico (Operaciones Directas)</option>
                <option value="intermediate">Intermedio (Leyes de Formación)</option>
                <option value="advanced">Avanzado (Retos Pre-U)</option>
            </select>
        </div>
        <button onclick="generateApp()">¡Generar Pizarras!</button>
    </div>

    <div id="main-container"></div>

    <script>
        const history = [];

        function generateApp() {
            const qty = parseInt(document.getElementById('qty').value);
            const level = document.getElementById('level').value;
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            for (let i = 1; i <= qty; i++) {
                const problem = createProblem(level, i);
                renderProblem(problem, container);
            }
        }

        function createProblem(level, id) {
            const types = {
                basic: ['union_names', 'inter_numbers', 'diff_direct', 'complement_basic'],
                intermediate: ['form_linear', 'form_quad', 'cardinal_diff', 'sum_elements'],
                advanced: ['system_unitary', 'three_sets', 'complex_logic']
            };

            const type = types[level][Math.floor(Math.random() * types[level].length)];
            let data = {};
            const seed = Math.floor(Math.random() * 5);

            switch(type) {
                case 'form_linear': // Basado en Imagen 1 (Ej 4 y 6)
                    let base = seed + 1;
                    let A_vals = [0,1,2,3].map(x => 2*x + base);
                    data = {
                        enunciado: `Dado el conjunto por comprensión:<br><span class="math-block">M = {2x + ${base} / x ∈ ℕ; x ≤ 3}</span>`,
                        pregunta: `Determine el conjunto M por extensión considerando a 0 ∈ ℕ.`,
                        pasos: [`Tabulamos x = {0, 1, 2, 3}`, ...[0,1,2,3].map(x => `Para x=${x}: 2(${x})+${base} = ${2*x+base}`)],
                        correct: `{ ${A_vals.join('; ')} }`,
                        opType: 'unitary'
                    };
                    break;

                case 'cardinal_diff': // Basado en Imagen 2
                    let M = [0, 2, 4, 6];
                    let N = [1, 2, 3, 4, 5];
                    let diff = M.filter(x => !N.includes(x));
                    data = {
                        enunciado: `Sean los conjuntos:<br><span class="math-block">M = {0; 2; 4; 6} y N = {1; 2; 3; 4; 5}</span>`,
                        pregunta: `Halle el cardinal del conjunto diferencia n(M - N)`,
                        pasos: [
                            `1. Hallamos M - N (elementos de M que no están en N).`,
                            `2. M - N = { ${diff.join('; ')} }`,
                            `3. El cardinal n es la cantidad de elementos: ${diff.length}`
                        ],
                        correct: diff.length.toString(),
                        opType: 'diff'
                    };
                    break;

                case 'form_quad': // Basado en Imagen 1 (Q) e Imagen 3 (Q)
                    data = {
                        enunciado: `Sea el conjunto:<br><span class="math-block">Q = {x² / x ∈ ℕ; 2 < x < 6}</span>`,
                        pregunta: `¿Cuáles son los elementos del conjunto Q?`,
                        pasos: [
                            `Valores de x permitidos: {3, 4, 5}`,
                            `Para x=3: 3² = 9`,
                            `Para x=4: 4² = 16`,
                            `Para x=5: 5² = 25`,
                            `Q = {9; 16; 25}`
                        ],
                        correct: `{ 9; 16; 25 }`,
                        opType: 'unitary'
                    };
                    break;

                case 'sum_elements': // Basado en Imagen 1 (Ej 5)
                    data = {
                        enunciado: `Dados:<br><span class="math-block">A = {x³ / x ∈ ℕ, 0 ≤ x < 3}<br>B = {x-3 / x ∈ ℕ, 3 ≤ x < 6}</span>`,
                        pregunta: `Halle la suma de los elementos de (A ∩ B)`,
                        pasos: [
                            `A = {0, 1, 8} (porque 0³, 1³, 2³)`,
                            `B = {0, 1, 2} (porque 3-3, 4-3, 5-3)`,
                            `Intersección A ∩ B = {0, 1}`,
                            `Suma de elementos: 0 + 1 = 1`
                        ],
                        correct: "1",
                        opType: 'inter'
                    };
                    break;

                case 'complement_basic': // Basado en PDF Texto (Complemento)
                    data = {
                        enunciado: `Si el Universo es U = {1; 2; 3; 4; 5; 6; 7; 8} y el conjunto A = {2; 4; 6; 8}.`,
                        pregunta: `Determine el complemento de A (A')`,
                        pasos: [
                            `Definición: A' son los elementos de U que no están en A.`,
                            `U = {1, 2, 3, 4, 5, 6, 7, 8}`,
                            `A = {2, 4, 6, 8}`,
                            `A' = {1, 3, 5, 7}`
                        ],
                        correct: "{ 1; 3; 5; 7 }",
                        opType: 'complement'
                    };
                    break;

                default: // Fallback a sistema unitario (tus retos anteriores)
                    data = {
                        enunciado: `Sabiendo que G = {x + y; 10} y H = {x - y; 4} son conjuntos unitarios.`,
                        pregunta: `Calcule el valor de x.`,
                        pasos: [`x + y = 10`, `x - y = 4`, `Sumando: 2x = 14 ➔ x = 7`],
                        correct: "7",
                        opType: 'unitary'
                    };
            }

            let options = new Set([data.correct]);
            while(options.size < 4) {
                let val = data.correct.includes('{') ? `{ ${Math.floor(Math.random()*10)}; ${Math.floor(Math.random()*10)} }` : (Math.floor(Math.random()*20)).toString();
                options.add(val);
            }

            return { id, ...data, options: Array.from(options).sort(() => Math.random() - 0.5) };
        }

        function renderProblem(ex, container) {
            const div = document.createElement('div');
            div.className = 'panel';
            div.innerHTML = `
                <div class="enunciado">
                    <strong>Problema #${ex.id}:</strong> ${ex.enunciado}
                    <br><br><strong>Pregunta:</strong> ${ex.pregunta}
                </div>
                <div class="columns">
                    <div class="col-left" id="left-${ex.id}">
                        ${ex.options.map(opt => `
                            <div class="option-item" onclick="check(${ex.id}, '${opt}', '${ex.correct}', this)">
                                <input type="radio" name="r-${ex.id}">
                                <span style="margin-left:10px">${opt}</span>
                                <span class="status"></span>
                            </div>
                        `).join('')}
                        <div class="venn-container">${getVenn(ex.opType)}</div>
                    </div>
                    <div class="col-right" id="right-${ex.id}">
                        <h3 style="color:var(--board)">🦁 Solución de Leo:</h3>
                        ${ex.pasos.map(p => `<div class="step">${p}</div>`).join('')}
                        <div style="margin-top:20px; font-weight:bold; color:var(--secondary); text-align:center; border:2px solid; padding:10px; border-radius:8px;">
                            RPTA: ${ex.correct}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function check(id, selected, correct, el) {
            const parent = document.getElementById(`left-${id}`);
            const right = document.getElementById(`right-${id}`);
            const status = el.querySelector('.status');
            parent.classList.add('disabled');
            right.style.display = 'block';
            if (selected === correct) { el.classList.add('correct-choice'); status.innerHTML = '✅'; }
            else { el.classList.add('wrong-choice'); status.innerHTML = '❌'; }
        }

        function getVenn(op) {
            const color = "#FF9800";
            if(op === 'complement') {
                return `<svg width="140" height="90">
                    <rect x="5" y="5" width="130" height="80" fill="${color}" fill-opacity="0.3" stroke="#333" />
                    <circle cx="70" cy="45" r="30" fill="white" stroke="#333" />
                    <text x="65" y="50">A</text><text x="10" y="20" font-size="10">U</text>
                </svg>`;
            }
            if(op === 'inter') {
                return `<svg width="140" height="90">
                    <circle cx="50" cy="45" r="30" fill="none" stroke="#333" />
                    <circle cx="90" cy="45" r="30" fill="none" stroke="#333" />
                    <path d="M 70 23 A 30 30 0 0 1 70 67 A 30 30 0 0 1 70 23" fill="${color}" />
                </svg>`;
            }
            if(op === 'diff') {
                return `<svg width="140" height="90">
                    <circle cx="50" cy="45" r="30" fill="${color}" stroke="#333" />
                    <circle cx="90" cy="45" r="30" fill="white" stroke="#333" />
                </svg>`;
            }
            return `<svg width="140" height="90"><circle cx="70" cy="45" r="35" fill="${color}" fill-opacity="0.2" stroke="#333" /><text x="65" y="50">A</text></svg>`;
        }

        window.onload = generateApp;
    </script>
</body>
</html>
